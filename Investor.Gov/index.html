<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CPU test</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Main Canvas Element -->
    <canvas id="canvas" width="1000" height="500"></canvas>
    <!-- Input For History Length -->
    <label for="history">History:</label>
    <input id="history" type="number" value="200">
    <!-- Input For Candle Size -->
    <label for="candle_size">Ticks per Candle:</label>
    <input id="candle_size" type="number" value="20">
    <!-- Debug Element -->
    <div id="debug"></div>
    <!-- Initialise Scripts -->
    <script type="module" src="order_book.js"></script>
    <script type="module" src="market.js"></script>
    <script type="module" src="main.js" defer></script>

  </body>
</html>
